# PHANTOM — docker compose mesh simulation
#
# Spins up 3 PHANTOM mesh nodes on a shared Docker network.
# Each node:
#   - Generates an ML-DSA-65 keypair (NIST FIPS 204) independently
#   - Produces signed, SHA3-256 hash-chained attestation records on a timer
#   - Gossips records to peers over TCP, enforcing the LoRa 250-byte packet limit
#   - Verifies every incoming record's ML-DSA-65 signature before accepting
#   - Persists a full attestation log (own + gossip) to ./output/<node>/
#
# Usage:
#   docker compose up --build
#
# After it completes, inspect any node's log:
#   sqlite3 output/node-1/node-1_attestation.db \
#     "SELECT origin_id, source, message, substr(entry_hash,1,8) FROM attestation_log;"
#
# What this proves:
#   - The full PHANTOM cryptographic stack (liboqs + OpenSSL + SQLite) builds from source
#   - Three independent nodes gossip and cross-verify each other's PQ signatures
#   - Each node's log contains records from all three nodes, all verified
#   - The LoRa 250-byte packet constraint is enforced at the transport layer
#   - docker compose up --build is the only dependency

services:

  node-1:
    build:
      context: ./node
      dockerfile: Dockerfile
    command:
      - "--id"   
      - "node-1"
      - "--port"
      - "7001"
      - "--peers"
      - "node-2:7002,node-3:7003"
      - "--duration"
      - "20"
      - "--interval"
      - "4"
    volumes:
      - ./output/node-1:/data
    networks:
      - phantom-mesh

  node-2:
    build:
      context: ./node
      dockerfile: Dockerfile
    command:
      - "--id"
      - "node-2"
      - "--port"
      - "7002"
      - "--peers"
      - "node-1:7001,node-3:7003"
      - "--duration"
      - "20"
      - "--interval"
      - "4"
    volumes:
      - ./output/node-2:/data
    networks:
      - phantom-mesh

  node-3:
    build:
      context: ./node
      dockerfile: Dockerfile
    command:
      - "--id"
      - "node-3"
      - "--port"
      - "7003"
      - "--peers"
      - "node-1:7001,node-2:7002"
      - "--duration"
      - "20"
      - "--interval"
      - "4"
    volumes:
      - ./output/node-3:/data
    networks:
      - phantom-mesh

networks:
  phantom-mesh:
    driver: bridge

