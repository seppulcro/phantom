# PHANTOM — docker compose validation
#
# Spins up 3 independent nodes, each:
#   - built from source (liboqs + phantom_node)
#   - running the PQ attestation chain
#   - writing its SQLite log to ./output/<node>/
#
# Usage:
#   docker compose up --build
#
# After it completes, ./output/ contains the SQLite attestation databases
# from all three nodes — inspect with: sqlite3 output/node-1/phantom_attestation.db
#
# This proves the full PHANTOM cryptographic stack (ML-DSA-65 + SHA3-256 + SQLite)
# is buildable and functional in an isolated environment by anyone with Docker.

services:

  node-1:
    build:
      context: ./node
      dockerfile: Dockerfile
    command:
      - "PHANTOM node-1 boot — post-quantum stack initialized"
      - "node-1: AI inference result signed and attested"
      - "node-1: mesh beacon transmitted"
    volumes:
      - ./output/node-1:/data

  node-2:
    build:
      context: ./node
      dockerfile: Dockerfile
    command:
      - "PHANTOM node-2 boot — post-quantum stack initialized"
      - "node-2: operator order received and signed"
      - "node-2: mesh beacon acknowledged"
    volumes:
      - ./output/node-2:/data

  node-3:
    build:
      context: ./node
      dockerfile: Dockerfile
    command:
      - "PHANTOM node-3 boot — post-quantum stack initialized"
      - "node-3: position broadcast attested"
      - "node-3: DRAM entropy-seeded channel offset logged"
    volumes:
      - ./output/node-3:/data
